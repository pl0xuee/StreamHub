<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <title>StreamHub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav id="sidebar">
      <div class="brand">
        <button id="btn-collapse" title="Hide sidebar" aria-label="Hide sidebar">
          <span class="bars"></span>
        </button>
        <span class="brand-text">StreamHub</span>
        <!-- Lit while something is playing. When the house lights go down (see .lights-down in
             styles.css) this is the only thing left on, so a dark sidebar reads as "playing"
             rather than "stopped working". -->
        <span id="onair" class="onair" title="Playing" hidden></span>
      </div>

      <ul id="service-list" class="services"></ul>

      <!-- Grid controls: the panes as they are actually tiled, how they are arranged, and a line
           saying how to work them. Shown only in grid mode. -->
      <section id="grid-panel" class="grid-panel" hidden>
        <div
          id="grid-preview"
          class="grid-preview"
          role="group"
          aria-label="Panes — drag a tile to move it"
        ></div>

        <div id="grid-layout" class="grid-layout" role="group" aria-label="Pane arrangement">
          <button data-layout="auto" title="Packed — fill the space evenly">▦</button>
          <button data-layout="rows" title="Stacked — one above another">▤</button>
          <button data-layout="columns" title="Side by side — one next to another">▥</button>
        </div>

        <p id="grid-hint" class="grid-hint">
          Click a service to add a pane. Drag a tile to move it.
        </p>
      </section>

      <div class="list-actions">
        <button id="btn-removed" title="Show removed services">Removed <span id="removed-count">0</span></button>
      </div>

      <div class="sidebar-footer">
        <div class="toolbar">
          <button id="btn-back" title="Back">‹</button>
          <button id="btn-reload" title="Reload">⟳</button>
          <button id="btn-grid" title="Grid view — watch up to 4 at once" aria-pressed="false">▦</button>
          <button id="btn-fullscreen" title="Fullscreen (F11)">⛶</button>
        </div>
        <div class="app-meta">
          <span id="app-version">v—</span>
          <button id="btn-settings" title="Settings">
            <span class="gear" aria-hidden="true">⚙</span>
            <span class="btn-label">Settings</span>
          </button>
        </div>
      </div>
    </nav>

    <!-- Right-click menu for a service row. Hidden until a row is right-clicked. -->
    <div id="service-menu" class="context-menu" hidden>
      <div class="context-title" id="menu-title">Service</div>
      <button id="menu-adblock" class="context-item">Block ads here</button>
      <button id="menu-signout" class="context-item danger">Sign out / clear data</button>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
