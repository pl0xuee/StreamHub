<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <title>StreamHub</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav id="sidebar">
      <div class="brand">
        <button id="btn-collapse" title="Hide sidebar" aria-label="Hide sidebar">
          <span class="bars"></span>
        </button>
        <span class="brand-text">StreamHub</span>
      </div>

      <ul id="service-list" class="services"></ul>

      <div class="list-actions">
        <button id="btn-removed" title="Show removed services">Removed <span id="removed-count">0</span></button>
      </div>

      <div class="settings">
        <label class="setting" for="chk-adblock">
          <input type="checkbox" id="chk-adblock" />
          <span class="setting-text">
            <span class="setting-title">Experimental ad blocker</span>
            <span class="setting-sub" id="adblock-sub">Brave Experimental Adblock Rules</span>
          </span>
        </label>

        <div class="setting-extra" id="adblock-extra" hidden>
          <span id="filter-age">Filters: —</span>
          <button id="btn-refresh-filters" title="Fetch the latest filter lists now">Update</button>
        </div>

        <label class="setting" for="chk-tray">
          <input type="checkbox" id="chk-tray" />
          <span class="setting-text">
            <span class="setting-title">Keep running in tray</span>
            <span class="setting-sub">Closing the window keeps playback going</span>
          </span>
        </label>
      </div>

      <div class="sidebar-footer">
        <div class="toolbar">
          <button id="btn-back" title="Back">‹</button>
          <button id="btn-reload" title="Reload">⟳</button>
          <button id="btn-pip" title="Picture-in-picture">⧉</button>
          <button id="btn-fullscreen" title="Fullscreen (F11)">⛶</button>
        </div>
        <div class="app-meta">
          <span id="app-version">v—</span>
          <button id="btn-update" title="Check for updates">Check for updates</button>
        </div>
      </div>
    </nav>

    <!-- Right-click menu for a service row. Hidden until a row is right-clicked. -->
    <div id="service-menu" class="context-menu" hidden>
      <div class="context-title" id="menu-title">Service</div>
      <button id="menu-adblock" class="context-item">Block ads here</button>
      <button id="menu-signout" class="context-item danger">Sign out / clear data</button>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
