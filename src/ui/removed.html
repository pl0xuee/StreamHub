<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <title>Removed services</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="removed-window">
    <header class="removed-header">
      <h1>Removed services</h1>
      <p>Click one to add it back to your list.</p>
    </header>
    <ul id="removed-list" class="services"></ul>
    <p id="removed-empty" class="empty" hidden>Nothing removed. Sites you delete show up here.</p>
    <script src="removed.js"></script>
  </body>
</html>
