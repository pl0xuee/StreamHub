name: Release

# Build the Linux AppImage and attach it to the GitHub release for the pushed tag.
# Trigger by pushing a version tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`),
# or run manually from the Actions tab to test a build without publishing.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (also downloads the castLabs Electron + Widevine binary)
        run: npm install

      # `--publish never` keeps electron-builder from auto-publishing to GitHub (which
      # would also upload its electron-updater metadata, latest*.yml, that this app
      # doesn't use). The upload step below attaches only the AppImage.
      - name: Build AppImage
        run: npm run build -- --publish never

      - name: Upload build for manual test runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: StreamHub-AppImage
          path: dist/*.AppImage
          if-no-files-found: ignore
          retention-days: 14

      - name: Attach AppImage to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # auto changelog ("What's Changed") from commits
          body: |
            ## Install (Linux)

            Download `StreamHub-*.AppImage`, then:
            ```bash
            chmod +x StreamHub-*.AppImage
            ./StreamHub-*.AppImage        # needs FUSE 2 (see the README)
            ```

            Playback caps at ~720p on the DRM services (a Linux/Widevine limitation);
            YouTube/Twitch and other non-DRM services can go higher.

            ---
          files: dist/*.AppImage
