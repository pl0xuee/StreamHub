name: Release

# Build the Linux AppImage and attach it to the GitHub release for the pushed tag, with a
# changelog generated from the commits since the previous tag. Trigger by pushing a version
# tag (e.g. `git tag v0.3.0 && git push origin v0.3.0`), or run manually from the Actions
# tab to test a build without publishing.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, so the changelog can diff against the last tag

      # node-version is the Node the *build* runs on. It is unrelated to the Node the actions
      # themselves run on, which is what their major versions pin — those had to move off the
      # retired Node 20 action runtime.
      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install dependencies (also downloads the castLabs Electron + Widevine binary)
        run: npm install

      # `--publish never` keeps electron-builder from auto-publishing to GitHub; the upload
      # step below owns that, so the release notes stay ours. The build still writes the
      # electron-updater metadata (latest-linux.yml + .blockmap) into dist/, and the app's
      # in-app updater needs both published alongside the AppImage to find and fetch a new
      # version — see the "check-for-updates" handler in src/main.js.
      - name: Build AppImage
        run: npm run build -- --publish never

      - name: Upload build for manual test runs
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: StreamHub-AppImage
          path: dist/*.AppImage
          if-no-files-found: ignore
          retention-days: 14

      # Build the changelog from git commits since the previous tag. GitHub's own
      # generate_release_notes only lists merged PRs; this repo commits straight to main,
      # so we roll our own from `git log`.
      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          CUR="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${CUR}^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${CUR}"
            HEADER="Changes since ${PREV}"
          else
            RANGE="${CUR}"
            HEADER="Initial release"
          fi
          LOG=$(git log "$RANGE" --no-merges --pretty=format:'- %s' | grep -viE '^- Release v[0-9]' || true)
          [ -z "$LOG" ] && LOG="- Maintenance and internal changes"
          {
            echo "notes<<CHANGELOG_EOF"
            echo "## What's changed"
            echo ""
            echo "_${HEADER}_"
            echo ""
            echo "$LOG"
            if [ -n "$PREV" ]; then
              echo ""
              echo "**Full changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${CUR}"
            fi
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Attach AppImage to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## Install (Linux)

            Download `StreamHub-*.AppImage`, then:
            ```bash
            chmod +x StreamHub-*.AppImage
            ./StreamHub-*.AppImage        # needs FUSE 2 (see the README)
            ```

            Playback caps at ~720p on the DRM services (a Linux/Widevine limitation);
            YouTube/Twitch and other non-DRM services can go higher.

            ---

            ${{ steps.changelog.outputs.notes }}
          # latest-linux.yml is what the in-app updater reads to discover a new version and
          # verify its checksum; without it published, "Check for updates" can only fall back
          # to the browser. (AppImage embeds its block map in the image, so there is no
          # separate .blockmap file to attach.)
          files: |
            dist/*.AppImage
            dist/latest-linux.yml
